<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynamic Prompt Builder</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
    padding:30px;
}

.container{
    width:100%;
    max-width:900px;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:25px;
    padding:40px;
    box-shadow:0 20px 40px rgba(0,0,0,0.25);
    color:white;
}

.header{
    text-align:center;
    margin-bottom:35px;
}

.header h1{
    font-size:2.5rem;
    margin-bottom:10px;
}

.header p{
    color:#e0e0e0;
}

.form-group{
    margin-bottom:25px;
}

label{
    display:block;
    margin-bottom:10px;
    font-weight:600;
}

input, textarea{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:rgba(255,255,255,0.15);
    color:white;
    font-size:16px;
    outline:none;
}

input::placeholder,
textarea::placeholder{
    color:#ddd;
}

textarea{
    min-height:120px;
    resize:none;
}

.btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:12px;
    font-size:18px;
    font-weight:600;
    cursor:pointer;
    background:white;
    color:#6a11cb;
    transition:.3s;
}

.btn:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(255,255,255,.3);
}

.output-card{
    margin-top:30px;
    background:#0f172a;
    border-radius:15px;
    padding:25px;
    display:none;
}

.output-card h3{
    margin-bottom:15px;
    color:#38bdf8;
}

.output{
    white-space:pre-wrap;
    line-height:1.7;
    color:#f8fafc;
}

.loader{
    display:none;
    text-align:center;
    margin-top:20px;
}

.loader span{
    width:12px;
    height:12px;
    background:white;
    border-radius:50%;
    display:inline-block;
    margin:0 5px;
    animation:bounce 0.6s infinite alternate;
}

.loader span:nth-child(2){
    animation-delay:.2s;
}

.loader span:nth-child(3){
    animation-delay:.4s;
}

@keyframes bounce{
    to{
        transform:translateY(-10px);
    }
}

@media(max-width:768px){

.header h1{
    font-size:2rem;
}

.container{
    padding:25px;
}

}

</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>🚀 Dynamic Prompt Builder</h1>
        <p>Convert Project Metadata into ATS-Friendly AI Prompts</p>
    </div>

    <div class="form-group">
        <label>Project Name</label>
        <input
            type="text"
            id="project"
            placeholder="Example: Inventory Management System">
    </div>

    <div class="form-group">
        <label>Skills (comma separated)</label>
        <input
            type="text"
            id="skills"
            placeholder="Python, FastAPI, PostgreSQL">
    </div>

    <button class="btn" onclick="generatePrompt()">
        Generate Prompt
    </button>

    <div class="loader" id="loader">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="output-card" id="outputCard">
        <h3>Generated Prompt</h3>
        <div class="output" id="output"></div>
    </div>

</div>

<script>

async function generatePrompt(){

    const project = document.getElementById("project").value;

    const skills = document.getElementById("skills")
                    .value
                    .split(",")
                    .map(skill => skill.trim());

    document.getElementById("loader").style.display="block";

    try{

        const response = await fetch(
            "http://127.0.0.1:8000/build-prompt",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    project:project,
                    skills:skills
                })
            }
        );

        const data = await response.json();

        document.getElementById("output").textContent =
            data.prompt;

        document.getElementById("outputCard")
            .style.display="block";

    }
    catch(error){

        document.getElementById("output").textContent =
            "Error connecting to API";

        document.getElementById("outputCard")
            .style.display="block";
    }

    document.getElementById("loader").style.display="none";
}

</script>

</body>
</html>
